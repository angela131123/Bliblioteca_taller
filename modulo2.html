<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo 2 - Gestión de Libros</title>

    <!-- CSS GENERAL -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- CSS ESPECÍFICO -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="panel-body">

    <!-- HEADER -->
    <header class="panel-header modulo2-header">
        <h1>📘 Gestión de Libros</h1>
        <button class="btn-login btn-success" onclick="volver()">⬅ Volver</button>
    </header>

    <!-- FORMULARIO -->
    <section class="card">
        <h2>📝 Registrar / Editar Libro</h2>

        <input type="text" id="titulo" placeholder="Título del libro" maxlength="200">
        <input type="text" id="autor" placeholder="Autor" maxlength="100">
        <input type="text" id="categoria" placeholder="Categoría (ej: Novela, Ciencia)" maxlength="50">

        <button class="btn-login" onclick="guardarLibro()">💾 Guardar Libro</button>
        <button class="btn-login btn-success" onclick="limpiar()">🧹 Limpiar</button>
    </section>

    <!-- BUSCADOR -->
    <section class="card">
        <h2>🔍 Buscar Libro</h2>
        <input type="text" id="buscar" placeholder="Buscar por título, autor o categoría..." onkeyup="buscarLibro()">
    </section>

    <!-- TABLA -->
    <section class="card">
        <h2>📋 Libros Registrados (<span id="totalLibros">0</span>)</h2>
        <table id="tablaLibros"></table>
    </section>

    <!-- PRÉSTAMOS -->
    <section class="card center">
        <h2>🚀 Ir a Préstamos</h2>
        <button class="btn-login btn-large" onclick="irPrestamo()">
            ➡️ Módulo de Préstamos
        </button>
    </section>

    <!-- API -->
    <section class="card">
        <h2>🌐 Libros desde OpenLibrary (API)</h2>
        <p>Selecciona un libro con portada real → se guarda automáticamente</p>

        <div id="apiLoading" class="loading">🔄 Conectando con OpenLibrary...</div>
        <div id="apiLibros" class="card-grid hidden"></div>
        <div id="apiError" class="api-error hidden"></div>
    </section>

    <script src="js/modulo2.js"></script>
</body>
</html>
