<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Préstamos - Historial</title>

<link rel="stylesheet" href="css/styles.css">
</head>

<body class="panel-body">

<header class="panel-header">
    <h1>📚 Gestión de Préstamos</h1>
    <button class="btn-salir" onclick="volver()">⬅ Libros</button>
</header>

<!-- PESTAÑAS -->
<div class="tabs-container">
    <button class="tab-btn active" onclick="mostrarPrestamos()">📝 Préstamos</button>
    <button class="tab-btn" onclick="mostrarHistorial()">📋 Historial</button>
</div>

<!-- ================= PRÉSTAMOS ================= -->
<section id="prestamos" class="tab-content active">

    <section class="card">
        <h2>Registrar Préstamo</h2>

        <input type="text" id="usuario" placeholder="Nombre del usuario">
        <select id="libroSelect"></select>

        <textarea id="comentario" placeholder="Comentario del lector..."></textarea>

        <button class="btn-login" onclick="registrarPrestamo()">
            Registrar Préstamo
        </button>
    </section>

    <section class="card">
        <h2>📚 Libros Disponibles</h2>

        <div id="catalogoPrestamo" class="grid-libros"></div>
    </section>

</section>

<!-- ================= HISTORIAL ================= -->
<section id="historial" class="tab-content">

    <section class="card">
        <h2>🕒 Historial de Préstamos</h2>

        <div id="historialLibros"></div>
    </section>

</section>

<script src="js/modulo3.js"></script>

</body>
</html>
